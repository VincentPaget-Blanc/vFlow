<svg width="100%" viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="820" height="480" fill="#1e1e1e" rx="10"/>

  <!-- Sidebar -->
  <rect x="8" y="8" width="170" height="464" fill="#2b2b2b" rx="6"/>

  <rect x="8" y="8" width="170" height="14" fill="#3c3f41" rx="3"/>
  <text x="93" y="19" fill="#aaa" font-size="9" font-weight="bold" text-anchor="middle">  POPULATION</text>
  <text x="16" y="34" fill="#aaa" font-size="9">Gate:</text>
  <rect x="16" y="38" width="154" height="15" fill="#3c3f41" rx="3"/>
  <text x="93" y="49" fill="#ccc" font-size="9" text-anchor="middle">Gate 1  ▾</text>
  <text x="16" y="63" fill="#aaa" font-size="9">Region:</text>
  <rect x="16" y="67" width="154" height="15" fill="#3c3f41" rx="3"/>
  <text x="93" y="78" fill="#ccc" font-size="9" text-anchor="middle">VGLUT1+/TH+  ▾</text>

  <rect x="8" y="88" width="170" height="14" fill="#3c3f41"/>
  <text x="16" y="99" fill="#aaa" font-size="9" font-weight="bold">  CHANNEL MAPPING</text>
  <text x="16" y="113" fill="#aaa" font-size="8">X Ch1 (centroid):</text>
  <rect x="16" y="116" width="154" height="14" fill="#3c3f41" rx="3"/>
  <text x="93" y="126" fill="#ccc" font-size="8" text-anchor="middle">X_TH_microns  ▾</text>
  <text x="16" y="139" fill="#aaa" font-size="8">Y Ch1 (centroid):</text>
  <rect x="16" y="142" width="154" height="14" fill="#3c3f41" rx="3"/>
  <text x="93" y="152" fill="#ccc" font-size="8" text-anchor="middle">Y_TH_microns  ▾</text>
  <text x="16" y="165" fill="#aaa" font-size="8">X Ch2 (centroid):</text>
  <rect x="16" y="168" width="154" height="14" fill="#3c3f41" rx="3"/>
  <text x="93" y="178" fill="#ccc" font-size="8" text-anchor="middle">X_VGLUT1_microns  ▾</text>
  <text x="16" y="191" fill="#aaa" font-size="8">Y Ch2 (centroid):</text>
  <rect x="16" y="194" width="154" height="14" fill="#3c3f41" rx="3"/>
  <text x="93" y="204" fill="#ccc" font-size="8" text-anchor="middle">Y_VGLUT1_microns  ▾</text>
  <rect x="16" y="210" width="154" height="14" fill="#666" rx="3"/>
  <text x="93" y="220" fill="#ccc" font-size="8" text-anchor="middle">⟳  Auto-detect columns</text>

  <rect x="8" y="228" width="170" height="14" fill="#3c3f41"/>
  <text x="16" y="239" fill="#aaa" font-size="9" font-weight="bold">  SETTINGS</text>
  <text x="16" y="252" fill="#aaa" font-size="8">Histogram bins (rose):</text>
  <rect x="16" y="255" width="50" height="14" fill="#3c3f41" rx="3"/>
  <text x="41" y="265" fill="#ccc" font-size="8" text-anchor="middle">36</text>
  <text x="16" y="278" fill="#aaa" font-size="8">Bar alpha (0–1):</text>
  <rect x="16" y="281" width="50" height="14" fill="#3c3f41" rx="3"/>
  <text x="41" y="291" fill="#ccc" font-size="8" text-anchor="middle">0.55</text>
  <text x="16" y="304" fill="#aaa" font-size="8">MRL threshold for arrow:</text>
  <rect x="16" y="307" width="50" height="14" fill="#3c3f41" rx="3"/>
  <text x="41" y="317" fill="#ccc" font-size="8" text-anchor="middle">0.3</text>

  <rect x="8" y="328" width="170" height="14" fill="#3c3f41"/>
  <text x="16" y="339" fill="#aaa" font-size="9" font-weight="bold">  ACTIONS</text>
  <rect x="16" y="344" width="154" height="16" fill="#4a90d9" rx="3"/>
  <text x="93" y="355" fill="white" font-size="9" text-anchor="middle">🔄  Compute &amp; Plot</text>
  <rect x="16" y="363" width="154" height="16" fill="#3a7d3a" rx="3"/>
  <text x="93" y="374" fill="white" font-size="9" text-anchor="middle">💾  Export figure</text>
  <rect x="16" y="382" width="154" height="16" fill="#3a5f8a" rx="3"/>
  <text x="93" y="393" fill="white" font-size="9" text-anchor="middle">📋  Export stats → CSV</text>

  <!-- Status bar -->
  <rect x="186" y="458" width="626" height="14" fill="#3c3f41" rx="3"/>
  <text x="499" y="468" fill="#888" font-size="8" text-anchor="middle">349 vectors  ·  3 file(s)  ·  Gate 1 / VGLUT1+/TH+  ·  bins: 36  ·  MRL-arrow threshold: 0.3</text>

  <!-- Plot area background -->
  <rect x="186" y="8" width="626" height="446" fill="#1e1e1e" rx="6"/>

  <!-- Polar axes: circles -->
  <circle cx="499" cy="230" r="170" fill="none" stroke="#333" stroke-width="0.8"/>
  <circle cx="499" cy="230" r="127" fill="none" stroke="#333" stroke-width="0.5"/>
  <circle cx="499" cy="230" r="85"  fill="none" stroke="#333" stroke-width="0.5"/>
  <circle cx="499" cy="230" r="42"  fill="none" stroke="#333" stroke-width="0.5"/>

  <!-- Polar axes: spokes at 45° increments -->
  <line x1="499" y1="60"  x2="499" y2="400" stroke="#333" stroke-width="0.5"/>
  <line x1="329" y1="60"  x2="669" y2="400" stroke="#333" stroke-width="0.5"/>
  <line x1="329" y1="230" x2="669" y2="230" stroke="#333" stroke-width="0.5"/>
  <line x1="329" y1="400" x2="669" y2="60"  stroke="#333" stroke-width="0.5"/>

  <!-- Angle labels -->
  <text x="499" y="53"  fill="#888" font-size="8" text-anchor="middle">90°</text>
  <text x="678" y="234" fill="#888" font-size="8">0°</text>
  <text x="499" y="412" fill="#888" font-size="8" text-anchor="middle">270°</text>
  <text x="308" y="234" fill="#888" font-size="8" text-anchor="end">180°</text>
  <text x="665" y="65"  fill="#888" font-size="8">45°</text>
  <text x="327" y="65"  fill="#888" font-size="8" text-anchor="end">135°</text>

  <!-- File A rose bars (blue) — vectors pointing mostly toward 45-90° -->
  <!-- bar at 60°: strong -->
  <path d="M499,230 L582,155 A130,130 0 0,1 545,119 Z" fill="#1f77b4" opacity="0.55"/>
  <!-- bar at 80°: medium -->
  <path d="M499,230 L545,119 A105,105 0 0,1 516,127 Z" fill="#1f77b4" opacity="0.55"/>
  <!-- bar at 40°: medium-small -->
  <path d="M499,230 L624,163 A90,90 0 0,1 582,155 Z" fill="#1f77b4" opacity="0.55"/>
  <!-- bar at 20°: small -->
  <path d="M499,230 L651,195 A60,60 0 0,1 634,162 Z" fill="#1f77b4" opacity="0.55"/>
  <!-- bar at 100°: small -->
  <path d="M499,230 L471,126 A50,50 0 0,1 455,138 Z" fill="#1f77b4" opacity="0.55"/>

  <!-- File B rose bars (orange) — slightly different direction -->
  <path d="M499,230 L592,145 A140,140 0 0,1 545,119 Z" fill="#ff7f0e" opacity="0.45"/>
  <path d="M499,230 L545,119 A115,115 0 0,1 510,121 Z" fill="#ff7f0e" opacity="0.45"/>
  <path d="M499,230 L638,170 A100,100 0 0,1 592,145 Z" fill="#ff7f0e" opacity="0.45"/>
  <path d="M499,230 L655,200 A70,70 0 0,1 638,170 Z" fill="#ff7f0e" opacity="0.45"/>

  <!-- File C rose bars (green) -->
  <path d="M499,230 L572,142 A125,125 0 0,1 540,125 Z" fill="#2ca02c" opacity="0.45"/>
  <path d="M499,230 L540,125 A95,95 0 0,1 510,121 Z" fill="#2ca02c" opacity="0.45"/>
  <path d="M499,230 L620,162 A85,85 0 0,1 572,142 Z" fill="#2ca02c" opacity="0.45"/>

  <!-- Mean direction arrows -->
  <line x1="499" y1="230" x2="570" y2="147" stroke="#1f77b4" stroke-width="2.2" marker-end="url(#marr)"/>
  <line x1="499" y1="230" x2="578" y2="143" stroke="#ff7f0e" stroke-width="2.2" marker-end="url(#marr)"/>
  <line x1="499" y1="230" x2="563" y2="150" stroke="#2ca02c" stroke-width="2.2" marker-end="url(#marr)"/>
  <defs>
    <marker id="marr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Stats annotation box -->
  <rect x="197" y="348" width="205" height="72" fill="#111" opacity="0.85" rx="4"/>
  <text x="205" y="363" fill="#ccc" font-size="8">Sample_A.csv</text>
  <text x="205" y="374" fill="#888" font-size="7.5">  n=349   MRL=0.821   p=0.0003   ✓ sig.</text>
  <text x="205" y="388" fill="#ccc" font-size="8">Sample_B.csv</text>
  <text x="205" y="399" fill="#888" font-size="7.5">  n=312   MRL=0.793   p=0.0008   ✓ sig.</text>
  <text x="205" y="413" fill="#ccc" font-size="8">Sample_C.csv</text>
  <text x="205" y="424" fill="#888" font-size="7.5">  n=298   MRL=0.756   p=0.0012   ✓ sig.</text>

  <!-- Legend -->
  <rect x="575" y="380" width="228" height="52" fill="#2b2b2b" opacity="0.9" rx="4"/>
  <rect x="582" y="390" width="10" height="10" fill="#1f77b4" opacity="0.7"/>
  <text x="596" y="399" fill="#ccc" font-size="8">Sample_A.csv  (n=349)</text>
  <rect x="582" y="405" width="10" height="10" fill="#ff7f0e" opacity="0.7"/>
  <text x="596" y="414" fill="#ccc" font-size="8">Sample_B.csv  (n=312)</text>
  <rect x="582" y="420" width="10" height="10" fill="#2ca02c" opacity="0.7"/>
  <text x="596" y="429" fill="#ccc" font-size="8">Sample_C.csv  (n=298)</text>

  <!-- Title -->
  <text x="499" y="30" fill="#ddd" font-size="11" text-anchor="middle" font-weight="bold">Vector directionality  —  Gate 1 / VGLUT1+/TH+</text>
</svg>
