  <rect x="555" y="102" width="6" height="6" fill="#9467bd" rx="1"/>
  <rect x="500" y="68"  width="6" height="6" fill="#9467bd" rx="1"/>
  <rect x="500" y="137" width="6" height="6" fill="#9467bd" rx="1"/>
  <text x="503" y="160" fill="#9467bd" font-size="8" text-anchor="middle" font-weight="bold">IN  (n=8)</text>
  <text x="503" y="212" fill="#666" font-size="8" text-anchor="middle">Fits elliptical clusters</text>

  <!-- POLYGON -->
  <rect x="610" y="10" width="200" height="200" fill="#242424" rx="6"/>
  <text x="710" y="26" fill="#aaa" font-size="9" font-weight="bold" text-anchor="middle">⬠  Polygon</text>
