  <circle cx="585" cy="70"  r="2" fill="#555" opacity="0.5"/>
  <circle cx="445" cy="155" r="2" fill="#555" opacity="0.5"/>
  <circle cx="575" cy="165" r="2" fill="#555" opacity="0.5"/>
  <circle cx="450" cy="170" r="2" fill="#555" opacity="0.5"/>
  <!-- IN dots -->
  <circle cx="480" cy="100" r="2" fill="#9467bd" opacity="0.85"/>
  <circle cx="495" cy="90"  r="2" fill="#9467bd" opacity="0.85"/>
  <circle cx="510" cy="105" r="2" fill="#9467bd" opacity="0.85"/>
  <circle cx="525" cy="95"  r="2" fill="#9467bd" opacity="0.85"/>
  <circle cx="515" cy="115" r="2" fill="#9467bd" opacity="0.85"/>
  <circle cx="500" cy="110" r="2" fill="#9467bd" opacity="0.85"/>
  <circle cx="488" cy="120" r="2" fill="#9467bd" opacity="0.85"/>
