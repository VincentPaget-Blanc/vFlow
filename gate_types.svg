  <polygon points="672,82 738,78 755,110 730,140 695,138 668,118" fill="none" stroke="#ff7f0e" stroke-width="1.8"/>
  <!-- Vertex dots -->
  <circle cx="672" cy="82"  r="3" fill="#ff7f0e"/>
  <circle cx="738" cy="78"  r="3" fill="#ff7f0e"/>
  <circle cx="755" cy="110" r="3" fill="#ff7f0e"/>
