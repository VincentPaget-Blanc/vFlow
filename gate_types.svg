  <circle cx="670" cy="80"  r="2" fill="#555" opacity="0.5"/>
  <circle cx="655" cy="45"  r="2" fill="#555" opacity="0.5"/>
  <circle cx="770" cy="55"  r="2" fill="#555" opacity="0.5"/>
  <circle cx="785" cy="70"  r="2" fill="#555" opacity="0.5"/>
