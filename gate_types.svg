  <circle cx="350" cy="95"  r="2" fill="#e74c3c" opacity="0.85"/>
  <!-- Rectangle gate -->
  <rect x="270" y="78" width="100" height="60" fill="none" stroke="#e74c3c" stroke-width="1.8" rx="2"/>
  <!-- Handles -->
  <rect x="267" y="75"  width="6" height="6" fill="#e74c3c" rx="1"/>
  <rect x="367" y="75"  width="6" height="6" fill="#e74c3c" rx="1"/>
  <rect x="267" y="135" width="6" height="6" fill="#e74c3c" rx="1"/>
  <rect x="367" y="135" width="6" height="6" fill="#e74c3c" rx="1"/>
  <rect x="315" y="75"  width="6" height="6" fill="#e74c3c" rx="1"/>
  <rect x="315" y="135" width="6" height="6" fill="#e74c3c" rx="1"/>
